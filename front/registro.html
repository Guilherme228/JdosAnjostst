<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="registro.css">
    <title>Registro</title>
</head>

<body>

    <div class="container">
        <div class="logo-area">
            <img src="./img/logo.png" alt="J-dos-anjos" class="logo">
        </div>

        <div class="form">

            <div class="input-group">
                <input type="usuario" id="usuario" placeholder="Usuário">
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha">
            </div>

            <div class="input-group">
                <input type="password" id="confirmar" placeholder="Confirme a senha">
            </div>

            <button onclick="registrar()">Registrar</button>

            <div class="link">
                <a href="index.html">Já tem uma conta? Entrar</a>
            </div>

        </div>
    </div>
</body>
<script src="registro.js"></script>
</html>
